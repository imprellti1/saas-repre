<!doctype html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>NeuralHire Admin</title>
  <style>
    body{font-family:Arial,sans-serif;background:#0b1224;color:#fff;margin:0;min-height:100vh;display:grid;place-items:center;padding:24px}
    .shell{width:min(560px,100%)}
    h1{text-align:center;margin:0 0 16px}
    input,button{padding:12px;margin:6px 0;border-radius:10px;border:1px solid #374151}
    button{background:#7c3aed;color:#fff;border:0;cursor:pointer}
    .btn-secondary{background:#334155}
    .card{background:#1f2937;padding:16px;border-radius:12px}
    .row{display:grid;gap:8px}
    .muted{opacity:.8}
    .password-row{display:grid;grid-template-columns:1fr auto;gap:8px;align-items:center}
  </style>
</head>
<body>
  <main class="shell">
  <h1>NeuralHire Admin</h1>
  <div class="card">
    <div id="setup" class="row">
      <h3>Primeiro acesso</h3>
      <input id="name" placeholder="Nome" />
      <input id="email" placeholder="Email" />
      <div class="password-row">
        <input id="password" type="password" placeholder="Senha" />
        <button class="btn-secondary" type="button" onclick="togglePassword('password', this)">Mostrar</button>
      </div>
      <button onclick="setup()">Criar primeiro admin</button>
    </div>
    <div id="login" class="row" hidden>
      <h3>Login</h3>
      <input id="lemail" placeholder="Email" />
      <div class="password-row">
        <input id="lpassword" type="password" placeholder="Senha" />
        <button class="btn-secondary" type="button" onclick="togglePassword('lpassword', this)">Mostrar</button>
      </div>
      <button onclick="login()">Entrar</button>
    </div>
    <p id="msg" class="muted"></p>
  </div>
  </main>
<script>
const API = window.API_BASE || "https://api.neuralhire.com.br";
async function boot(){const r=await fetch(API+"/api/setup/status");const d=await r.json();document.getElementById("setup").hidden=!d.needsSetup;document.getElementById("login").hidden=d.needsSetup;}
function togglePassword(inputId, button){
  const input = document.getElementById(inputId);
  const hidden = input.type === "password";
  input.type = hidden ? "text" : "password";
  button.textContent = hidden ? "Ocultar" : "Mostrar";
}
async function setup(){
  try{
    const body={name:name.value,email:email.value,password:password.value};
    const r=await fetch(API+"/api/setup",{method:"POST",headers:{"content-type":"application/json"},body:JSON.stringify(body)});
    const d=await r.json();
    msg.textContent=d?.error?`Erro: ${d.error}`:"Admin criado com sucesso.";
    await boot();
  }catch(e){
    msg.textContent=`Falha ao criar admin: ${e.message}`;
  }
}
async function login(){
  try{
    const body={email:lemail.value,password:lpassword.value};
    const r=await fetch(API+"/api/login",{method:"POST",headers:{"content-type":"application/json"},body:JSON.stringify(body)});
    const d=await r.json();
    localStorage.setItem("token",d.token||"");
    msg.textContent=d.token?"Login OK":"Falha login";
  }catch(e){
    msg.textContent=`Falha no login: ${e.message}`;
  }
}
boot();
</script>
</body>
</html>
